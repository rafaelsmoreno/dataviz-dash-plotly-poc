services:

  # ── 1. Data initializer ────────────────────────────────────────────────────
  # Downloads the raw data files (Parquet + CSVs) into the shared `data`
  # volume. Runs once; skips any file that already exists.
  data-init:
    image: python:3.12-slim
    container_name: dash_data_init
    entrypoint: ["/bin/sh", "/scripts/init_data.sh"]
    volumes:
      - data:/data
      - ./scripts:/scripts:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: "no"

  # ── 2. Dash application ────────────────────────────────────────────────────
  # Waits for data-init to complete, then serves the Dash app via gunicorn.
  # DuckDB runs in-memory inside the app; reads files from the `data` volume.
  dash:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dash_app
    depends_on:
      data-init:
        condition: service_completed_successfully
    volumes:
      - data:/data:ro
    ports:
      - "8050:8050"
    environment:
      - DATA_DIR=/data
      - PYTHONUNBUFFERED=1
      # DuckDB resource limits (tune for your host).
      # DUCKDB_MEMORY_LIMIT caps working-set per query connection during cold scan.
      # DUCKDB_THREADS limits parallelism per connection (2 workers × 2 threads = 4 total).
      - DUCKDB_MEMORY_LIMIT=1GB
      - DUCKDB_THREADS=2
    restart: unless-stopped

volumes:
  data:
    driver: local
